name: Auto Blog (Gemini → Supabase)

on:
  schedule:
    # KST 08:00 (UTC 23:00) — 하루 1회
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: auto-blog
  cancel-in-progress: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "google-genai" "supabase" "requests" "pydantic"

      - name: Run auto blog script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLOUDFLARE_DEPLOY_HOOK_URL: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}
        run: |
          python scripts/auto_blog.py


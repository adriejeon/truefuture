name: Migrate Blog Posts (sanitize + normalize)

on:
  workflow_dispatch:
    inputs:
      apply:
        description: '실제 DB 업데이트 여부 (false면 dry-run)'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      limit:
        description: '처리할 행 수 (0=전체)'
        required: false
        default: '0'
      show_diff:
        description: '변경된 본문의 unified diff 출력'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      trigger_deploy:
        description: '--apply 성공 후 Cloudflare 배포 훅 호출'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

concurrency:
  group: migrate-blog-posts
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "supabase" "requests" "pydantic" "google-genai"

      - name: Run migration
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLOUDFLARE_DEPLOY_HOOK_URL: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}
        run: |
          ARGS=""
          if [ "${{ inputs.apply }}" = "true" ]; then ARGS="$ARGS --apply"; fi
          if [ "${{ inputs.show_diff }}" = "true" ]; then ARGS="$ARGS --show-diff"; fi
          if [ "${{ inputs.trigger_deploy }}" = "true" ]; then ARGS="$ARGS --trigger-deploy"; fi
          LIMIT="${{ inputs.limit }}"
          if [ -n "$LIMIT" ] && [ "$LIMIT" != "0" ]; then ARGS="$ARGS --limit $LIMIT"; fi
          echo "Running: python scripts/migrate_blog_posts.py $ARGS"
          python scripts/migrate_blog_posts.py $ARGS
